spring.application.name=backendapi

# Server
server.forward-headers-strategy=framework

# -----------------------------
# Database (MySQL)
# -----------------------------
# Uses the database container environment variables:
# - MYSQL_URL
# - MYSQL_PORT
# - MYSQL_DB
# - MYSQL_USER
# - MYSQL_PASSWORD
spring.datasource.url=jdbc:mysql://${MYSQL_URL}:${MYSQL_PORT}/${MYSQL_DB}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
spring.datasource.username=${MYSQL_USER}
spring.datasource.password=${MYSQL_PASSWORD}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# -----------------------------
# JPA / Hibernate
# -----------------------------
# For production, prefer Flyway/Liquibase. For this template we auto-create schema.
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# -----------------------------
# Actuator
# -----------------------------
management.endpoints.web.exposure.include=health,info,metrics

# -----------------------------
# Swagger/OpenAPI
# -----------------------------
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# -----------------------------
# App CORS (frontend)
# -----------------------------
# Frontend URL should be set in backend container environment:
# FRONTEND_ORIGIN=https://<frontend-host>
app.cors.allowed-origins=${FRONTEND_ORIGIN:http://localhost:3000}
app.cors.allowed-methods=GET,POST,PUT,PATCH,DELETE,OPTIONS
app.cors.allowed-headers=*
app.cors.allow-credentials=true

# -----------------------------
# Security
# -----------------------------
# Simple header-based auth:
# - X-USER: username/email
# - X-ROLE: ADMIN | MANAGER | USER
app.security.enabled=true
